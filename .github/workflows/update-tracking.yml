name: Update Nasdaq-100 tracking data

on:
  workflow_dispatch:
  schedule:
    # 週一至週五 UTC 23:40，約為台灣時間隔日上午 07:40。
    - cron: "40 23 * * 1-5"

permissions:
  contents: write

concurrency:
  group: ndxl-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch and calculate tracking data
        run: python scripts/update_tracking.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- data/tracking.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/tracking.json
          git commit -m "data: update Nasdaq-100 tracking snapshot"
          git push
